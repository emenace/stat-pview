<!DOCTYPE html>
<html lang="en" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Statistic Public View — Dashboard</title>
  <meta name="description" content="Interactive public dashboard for viewing statistical data with dynamic charts and searchable tables." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS -->
  <link rel="stylesheet" href="/css/output.css" />

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

  <!-- Tabulator CSS & JS -->
  <link href="https://unpkg.com/tabulator-tables@6.3.1/dist/css/tabulator_midnight.min.css" rel="stylesheet" />
  <script src="https://unpkg.com/tabulator-tables@6.3.1/dist/js/tabulator.min.js"></script>

  <style>
    body { font-family: 'Inter', sans-serif; }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(148,163,184,0.4); border-radius: 8px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(148,163,184,0.6); }

    /* Category tabs scrollable container */
    #category-tabs { scrollbar-width: thin; scrollbar-color: rgba(148,163,184,0.3) transparent; }

    /* Animated gradient background */
    .hero-gradient {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      background-size: 200% 200%;
      animation: gradientShift 8s ease infinite;
    }
    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    /* Loading shimmer */
    .shimmer {
      background: linear-gradient(90deg, transparent 33%, rgba(255,255,255,0.15) 50%, transparent 67%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }

    /* Smooth fade in */
    .fade-in { animation: fadeIn 0.5s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    /* Tabulator theme overrides for consistency */
    .tabulator {
      background: transparent !important;
      border: none !important;
      border-radius: 0.75rem !important;
      overflow: hidden;
      font-family: 'Inter', sans-serif !important;
    }
    .tabulator .tabulator-header { background: rgba(99, 102, 241, 0.08) !important; border-bottom: 1px solid rgba(148,163,184,0.2) !important; }
    .tabulator .tabulator-header .tabulator-col { border-right: 1px solid rgba(148,163,184,0.1) !important; }
    .tabulator .tabulator-header .tabulator-col .tabulator-col-content .tabulator-col-title { font-weight: 600 !important; font-size: 0.8rem !important; }
    .tabulator .tabulator-tableholder .tabulator-table .tabulator-row { border-bottom: 1px solid rgba(148,163,184,0.1) !important; transition: background 0.15s; }
    .tabulator .tabulator-tableholder .tabulator-table .tabulator-row:hover { background: rgba(99, 102, 241, 0.05) !important; }
    .tabulator .tabulator-footer { background: rgba(99, 102, 241, 0.04) !important; border-top: 1px solid rgba(148,163,184,0.2) !important; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-200 transition-colors duration-300">

  <!-- ─── Header ──────────────────────────────────────── -->
  <header class="sticky top-0 z-50 backdrop-blur-xl bg-white/80 dark:bg-slate-900/80 border-b border-slate-200/50 dark:border-slate-800/50 shadow-sm">
    <nav class="max-w-7xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between">
      <!-- Brand -->
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-lg hero-gradient flex items-center justify-center shadow-md">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="white" class="w-5 h-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z" />
          </svg>
        </div>
        <div>
          <h1 class="text-lg font-bold tracking-tight text-slate-900 dark:text-white">Statistic Public View</h1>
          <p class="text-xs text-slate-500 dark:text-slate-400 hidden sm:block">Interactive Data Dashboard</p>
        </div>
      </div>

      <!-- Right Controls -->
      <div class="flex items-center gap-2">
        <button id="dark-mode-toggle" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors duration-200" title="Toggle Dark Mode">
          <span id="dark-mode-icon" class="text-slate-500 dark:text-slate-400"></span>
        </button>
        <a id="auth-link" href="/login.html" class="px-4 py-2 text-sm font-semibold rounded-lg bg-indigo-600 hover:bg-indigo-700 text-white transition-all duration-200 shadow-sm hover:shadow-md hover:-translate-y-0.5">
          Login
        </a>
      </div>
    </nav>
  </header>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 py-6">
    <!-- ─── Category Tabs ────────────────────────────── -->
    <div class="mb-6 fade-in">
      <div id="category-tabs" class="flex gap-2 overflow-x-auto pb-2"></div>
      <p id="category-description" class="mt-2 text-sm text-slate-500 dark:text-slate-400 min-h-[1.25rem]"></p>
    </div>

    <!-- ─── Loading Spinner ──────────────────────────── -->
    <div id="loading-spinner" class="hidden flex justify-center items-center py-20">
      <div class="flex flex-col items-center gap-3">
        <div class="w-10 h-10 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin"></div>
        <span class="text-sm text-slate-500 dark:text-slate-400">Loading data...</span>
      </div>
    </div>

    <!-- ─── Empty State ──────────────────────────────── -->
    <div id="empty-state" class="hidden fade-in">
      <div class="flex flex-col items-center justify-center py-20 text-center">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1" stroke="currentColor" class="w-20 h-20 text-slate-300 dark:text-slate-600 mb-4">
          <path stroke-linecap="round" stroke-linejoin="round" d="M20.25 6.375c0 2.278-3.694 4.125-8.25 4.125S3.75 8.653 3.75 6.375m16.5 0c0-2.278-3.694-4.125-8.25-4.125S3.75 4.097 3.75 6.375m16.5 0v11.25c0 2.278-3.694 4.125-8.25 4.125s-8.25-1.847-8.25-4.125V6.375m16.5 0v3.75m-16.5-3.75v3.75m16.5 0v3.75C20.25 16.153 16.556 18 12 18s-8.25-1.847-8.25-4.125v-3.75m16.5 0c0 2.278-3.694 4.125-8.25 4.125s-8.25-1.847-8.25-4.125" />
        </svg>
        <p class="text-lg text-slate-400 dark:text-slate-500 font-medium">No data available</p>
      </div>
    </div>

    <!-- ─── Chart Section ────────────────────────────── -->
    <section id="chart-section" class="hidden mb-8 fade-in">
      <div class="backdrop-blur-md bg-white/80 dark:bg-slate-900/70 border border-white/20 dark:border-slate-800 rounded-2xl shadow-lg p-6">
        <div class="relative h-[350px] sm:h-[420px]">
          <canvas id="stats-chart"></canvas>
        </div>
      </div>
    </section>

    <!-- ─── Table Section ────────────────────────────── -->
    <section id="table-section" class="hidden fade-in">
      <div class="backdrop-blur-md bg-white/80 dark:bg-slate-900/70 border border-white/20 dark:border-slate-800 rounded-2xl shadow-lg p-4 sm:p-6">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-base font-bold text-slate-700 dark:text-slate-200">📋 Data Table</h2>
          <span id="record-count" class="text-xs font-medium text-slate-400 dark:text-slate-500 bg-slate-100 dark:bg-slate-800 px-3 py-1 rounded-full"></span>
        </div>
        <div id="stats-table" class="rounded-xl overflow-hidden"></div>
      </div>
    </section>
  </main>

  <!-- ─── Footer ──────────────────────────────────────── -->
  <footer class="mt-12 border-t border-slate-200/50 dark:border-slate-800/50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-6 flex flex-col sm:flex-row items-center justify-between text-xs text-slate-400 dark:text-slate-500">
      <span>© 2026 Statistic Public View. All rights reserved.</span>
      <span class="mt-2 sm:mt-0">Built with Node.js, Tailwind CSS, Chart.js & Tabulator.js</span>
    </div>
  </footer>

  <!-- ─── Dashboard JS Module ──────────────────────── -->
  <script type="module" src="/js/dashboard.js"></script>
</body>
</html>
